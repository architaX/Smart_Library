<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="auth-body">

<div class="auth-box">

    <h1>📚 Smart Library</h1>

    <!-- FLASH MESSAGES -->

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            {% for message in messages %}

                <div class="flash-message">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <!-- LOGIN FORM -->

    <form method="POST">

        <input
        type="text"
        name="username"
        placeholder="Username"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button>Login</button>

    </form>

    <a href="/register">

        Register User

    </a>

</div>

</body>
</html>
